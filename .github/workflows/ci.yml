name: CI

on:
  push:
  pull_request:
    branches:
      - main
      - development

jobs:
  macos15:
    name: "macOS 15"
    runs-on: macos-15
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      SKBUILD_CMAKE_ARGS: "-DEXTRA_WARNINGS=ON"
      SKBUILD_BUILD_TARGETS: "all"
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"
    - name: Build and install package
      run: |
        python3 -m venv pyenv
        source pyenv/bin/activate
        python3 -m pip install wheel
        python3 -m pip wheel -v .
        python3 -m pip install bobkit-*.whl
    - name: Test import
      run: |
          source pyenv/bin/activate
          python3 - << 'EOF'
          import bobkit
          print("bobkit imported successfully")
          EOF
    - name: Run pytest
      run: |
        source pyenv/bin/activate
        python3 -m pip install pytest
        python3 -m pytest tests/ --ignore=tests/test_nxmap.py --ignore=tests/test_xmap.py
    - uses: actions/upload-artifact@v6
      with:
        name: bobkit-macos15
        path: |
          ./bobkit-*.whl
        retention-days: 14

  ubuntu2404:
    name: "Test build on Ubuntu 24.04"
    runs-on: ubuntu-24.04
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      SKBUILD_CMAKE_ARGS: "-DEXTRA_WARNINGS=ON"
      SKBUILD_BUILD_TARGETS: "all"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ cmake
      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install nanobind numpy pytest
      - name: build and test
        run: |
          g++ --version
          cmake --version
          python3 -m pip install --verbose .
          # python3 -m venv pyenv
          # source pyenv/bin/activate
          # python3 -m pip install nanobind
          # python3 -m pip install numpy
      - name: Test import
        run: |
          #source pyenv/bin/activate
          python3 - << 'EOF'
          import bobkit
          print("bobkit imported successfully")
          EOF
      - name: PyTesting
        run: |
          #source pyenv/bin/activate
          #python3 -m pip install pytest
          python3 -m pytest tests/ --ignore=tests/test_nxmap.py --ignore=tests/test_xmap.py
      - name: Test build docs
        run: |
          #source pyenv/bin/activate
          python3 -m pip install -r docs/Sphinx/source/requirements.txt
          sphinx-build -M html docs/Sphinx/source docs/Sphinx/_build/html

