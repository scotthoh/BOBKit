name: Test

on:
  push:
    branches:
      - nanobind
  pull_request:
    branches:
      - main
      - development

jobs:
  macos15:
    name: "macOS 15"
    runs-on: macos-15
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    env:
      SKBUILD_CMAKE_ARGS: "-DEXTRA_WARNINGS=ON"
      SKBUILD_BUILD_TARGETS: "all"
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Build and test
      run: |
        g++ --version
        cmake --version
        python3 -m venv pyenv
        source pyenv/bin/activate
        which python
